<html>
  <head>
    <title>Emotion Prediction Flask App</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
  	<div class="container">
  		<h1>Real Time Emotion Prediction</h1>
		<div id="error-message" style="display: none; color: red; padding: 10px; margin: 10px 0; background: #ffe6e6; border-radius: 5px;">
			<strong>⚠️ HTTPS Required:</strong> Camera access requires a secure connection. 
			<br>For local testing, use: <code>http://localhost:5000</code>
		</div>
		<div>
			<video id="video" width="640" height="480" autoplay style="display: none;"></video>
			<img 
				id="video_frame"
				width=800px
				height=480px
			/>
		</div>
    	<div class="footer">
			<a href="https://github.com/pratikgk45/emotion_prediction" target="_blank">
    			<img id="git_logo" src="{{ url_for('static', filename='github_logo.png') }}" />
			</a>
    	</div>
		<script src="{{ url_for('static', filename='script.js') }}"></script>
  	</div>
  </body>
</html>
